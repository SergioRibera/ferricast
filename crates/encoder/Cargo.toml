[package]
name = "ferricast-encoder"
version = "0.1.0"
edition = "2024"

[features]
# Zero-copy DMA-BUF input on NVENC. Requires a forked
# `shiguredo_nvcodec` that exposes `Encoder::register_external_dmabuf`
# + `Encoder::encode_external` (the upstream crate keeps those
# `pub(crate)`). Without the fork, NVENC stays on the CPU path
# (Vulkan readback + libcuda HtoD) which still works on every
# NVIDIA GPU — just not zero-copy.
#
# Toggle on with `--features nvenc-zero-copy` once `Cargo.toml`
# points `shiguredo_nvcodec` at a fork that publishes the two
# methods. The NVENC encoder file picks the right code path at
# compile time via `#[cfg(feature = "nvenc-zero-copy")]`.
default = []
nvenc-zero-copy = []

[dependencies]
ferricast-core.workspace = true
bytes.workspace = true
tracing.workspace = true

# VA-API binding without ffmpeg. Used to encode H.264 directly on
# the GPU when the system has a VA-API driver. Loaded at runtime;
# missing `libva.so` makes the encoder gracefully fall back to x264.
cros-libva = { git = "https://github.com/SergioRibera/cros-libva", rev = "3eb6e6e0e3085c8376124b75bf638ce6982b7b33" }

# NVENC (NVIDIA hardware H.264 encode). Higher-level Rust binding
# that wraps the Video Codec SDK headers — no SDK install needed at
# build time, the libraries (libcuda.so, libnvidia-encode.so) are
# dlopen'd at runtime. Missing libs cause `Encoder::new` to error
# and the factory falls back through VA-API / x264.
shiguredo_nvcodec = "2026.1.0"
openh264 = "0.9.3"
